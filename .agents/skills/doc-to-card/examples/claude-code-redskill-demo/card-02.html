<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Card 02 - Claude Code RedSkill Demo</title>
  <link rel="stylesheet" href="card-renderer.css">
</head>
<body class="single-page">
  <article class="xhs-card" aria-label="Claude Code RedSkill Demo Card 02">
    <div class="card-content">
      <div class="card-top">
        <span class="badge">RedSkill Demo</span>
        <span class="card-number">02</span>
      </div>
      <div class="title-zone">
        <h1 class="card-title">它首先 lives in the terminal</h1>
      </div>
      <p class="body-copy">
        Snapshot 说它 lives in the terminal，也可以用于 IDE 或 GitHub workflows。它不是只在聊天窗口里回答问题。
      </p>
      <div class="chips" aria-label="English technical labels">
        <span class="chip">terminal</span>
        <span class="chip">IDE / workflows</span>
      </div>
      <div class="visual-zone" aria-label="terminal IDE workflow entry blocks">
        <div class="entry-grid">
          <section class="entry-block">
            <div class="entry-icon terminal"></div>
            <p class="entry-name">Terminal</p>
          </section>
          <section class="entry-block">
            <div class="entry-icon ide">
              <span></span><span></span>
              <span></span><span></span>
              <span></span><span></span>
            </div>
            <p class="entry-name">IDE</p>
          </section>
          <section class="entry-block">
            <div class="entry-icon">
              <span class="branch-dot" style="width:16px;height:16px;margin:14px 0 0 15px;"></span>
              <span class="branch-dot" style="width:16px;height:16px;margin:9px 0 0 50px;"></span>
            </div>
            <p class="entry-name">Workflows</p>
          </section>
        </div>
        <span class="path-line" aria-hidden="true"></span>
        <span class="motif robot motif-card2-robot" aria-hidden="true"><span class="eye left"></span><span class="eye right"></span></span>
        <span class="motif fox motif-card2-fox" aria-hidden="true"><span class="eye left"></span><span class="eye right"></span><span class="face"></span></span>
      </div>
      <p class="evidence-note">
        证据边界：terminal、IDE、GitHub workflows 来自 source snapshot；不扩写为具体 IDE 支持或完整 GitHub 自动化。
      </p>
      <footer class="footer-mark">
        <span>SkillCraft / doc-to-card</span>
        <span class="footer-line"></span>
      </footer>
    </div>
  </article>
</body>
</html>
